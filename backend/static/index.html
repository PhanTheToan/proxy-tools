<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Reverse Proxy Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container layout-cms">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h1>Proxy Manager</h1>
            </div>
            <div class="sidebar-tree" id="sidebarTree">
                <!-- Dynamic tree content -->
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <div class="breadcrumbs" id="breadcrumbs">
                    <span class="breadcrumb-item" onclick="openFolder(null)">Home</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                    </button>
                    <button class="btn btn-secondary" id="bulkDeleteBtn" onclick="deleteSelectedProxies()" style="display: none; border-color: var(--color-destructive); color: var(--color-destructive);">Delete Selected</button>
                    <div class="search-box">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="searchInput" placeholder="Search globally..." onkeyup="filterTable()">
                    </div>
                    <button class="btn btn-secondary" onclick="openFolderModal()">+ New Folder</button>
                    <button class="btn btn-primary" onclick="openModal()">+ Add Proxy</button>
                </div>
            </header>

            <div class="table-container">
                <table id="proxyTable">
                    <thead>
                        <tr>
                            <th onclick="toggleSort()" style="cursor: pointer; user-select: none;" title="Click to reverse sort order">STT ⇅</th>
                            <th>Status</th>
                            <th>Local Port</th>
                            <th>Target URL</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="proxyBody">
                        <!-- Dynamic main content -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2>New Proxy Mapping</h2>
            <div class="form-group">
                <label>Local Port</label>
                <input type="number" id="localPort" placeholder="e.g. 33121">
            </div>
            <div class="form-group">
                <label>Target URL</label>
                <input type="url" id="targetUrl" placeholder="https://example.com">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="My dev environment">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitProxy()">Create</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addFolderModal">
        <div class="modal">
            <h2>New Folder</h2>
            <div class="form-group">
                <label>Folder Name</label>
                <input type="text" id="folderName" placeholder="e.g. Production APIs">
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeFolderModal()">Cancel</button>
                <button class="btn btn-primary" onclick="submitFolder()">Create</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
